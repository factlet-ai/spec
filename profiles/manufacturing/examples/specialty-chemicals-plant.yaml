  - id: f009
    statement: "Reactor R-1A jacket cooling lag is 4 minutes from setpoint change to actual jacket temperature response. Operators MUST NOT issue temperature setpoint changes faster than every 4 minutes — causes overshoot and risk of runaway exotherm. Applies to all heat-transfer-fluid loops on this unit."
