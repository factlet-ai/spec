metadata:
  name: specialty-chemicals-plant-2
  scope: project:acme-plant-2-pa
  description: |
    Sanitized worked-example factbook for a fictional specialty-chemicals
    plant. Demonstrates Manufacturing Profile v0.1 (RFC 0006):
      - All seven mfg_scope levels (enterprise / site / area / line / cell
        / unit / asset).
      - All six asset_phase values (fat / sat / commissioning / operation
        / maintenance / decommissioning).
      - Safety vocabulary: severity, permission_role, valid_until.
      - factlet_type extensions: hazard, alarm-correlation, vendor-quirk.
      - Manufacturing source_type extensions in origination blocks.

    The plant runs Sparkplug B + OPC UA Mode 3 over an Ignition Edge
    integration layer, with three production lines: api-synthesis (line-1
    with three reactor units R-1A/B/C and a dryer unit), compounding
    (line-2 with two mixer units M-1/M-2 and dosing/compounding cells),
    and qc-finishing (line-3).

    Citation discipline (per RFC-001 in v0.2): bare ids (e.g. f001) are
    valid INSIDE this file. External references MUST use the scoped form
    project:acme-plant-2-pa:f001.

content:

  # ─── ENTERPRISE-LEVEL FACTLET ────────────────────────────────────────

  - id: f001
    statement: "Acme Specialty Chemicals enterprise-wide standard: AVEVA PI is the corporate historian-of-record. All site-level historian deployments (Ignition Tag History, OSIsoft local) MUST replicate to corporate PI within 24 hours for cross-site analytics and regulatory long-term retention."
    confidence: 1.0
    factlet_type: convention
    sources:
      - "ITARCH-2023-001 (Enterprise Architecture Decision Record)"
    mfg_scope: enterprise
    enterprise_id: acme-specialty-chemicals
    asset_phase: operation
    permission_role: engineer
    tags: [enterprise, historian, pi, replication]
    origination:
      source_type: manual
      authored_at: "2026-05-09T01:00:00Z"
      authored_by: "human:alice@acme.example"
      trust_prior: 0.95

  # ─── SITE-LEVEL FACTLETS ─────────────────────────────────────────────

  - id: f002
    statement: "Plant OPC UA security policy: ALL clients/servers MUST use Mode 3 (Sign + Encrypt) with CertX-issued certificates. Mode 1 (None) and Mode 2 (Sign-only) are blocked at firewall."
    confidence: 1.0
    factlet_type: tenet
    sources:
      - "ISO 27001 audit finding ISO-2023-014"
      - "Security Policy SEC-2024-002 §5.3"
    mfg_scope: site
    enterprise_id: acme-specialty-chemicals
    site_id: acme-plant-2-pa
    asset_phase: operation
    permission_role: engineer
    tags: [opcua, security, audit, iso-27001]

  - id: f003
    statement: "Plant-standard Sparkplug B topic structure: spBv1.0/{group_id}/{message_type}/{edge_node_id}/[device_id]. Group ID convention is a shortened plant code (acme-pa, max 8 chars) — NOT the full ISA-95 site_id, due to MQTT topic-length overhead. The mapping group_id=acme-pa → site_id=acme-plant-2-pa is documented in ARCH-2024-001."
    confidence: 1.0
    factlet_type: convention
    sources:
      - "ARCH-2024-001 (Plant architecture decision record)"
      - "Sparkplug B v3.0 spec §5.1 (topic naming)"
    mfg_scope: site
    site_id: acme-plant-2-pa
    # no asset_phase — phase-agnostic (the topic structure applies through the asset lifecycle)
    tags: [sparkplug, mqtt, topic-convention]

  - id: f004
    statement: "Ignition Tag History retention is 90 days at full resolution, then 5-min averages for 2 years. For sub-second resolution beyond 90 days, query AVEVA PI Historian (independent retention: 7 years full)."
    confidence: 0.95
    factlet_type: convention
    sources:
      - "ARCH-2024-002 (Historian retention policy)"
    mfg_scope: site
    site_id: acme-plant-2-pa
    asset_phase: operation
    tags: [historian, retention, rca, ignition, pi]

  # ─── AREA-LEVEL FACTLET ──────────────────────────────────────────────

  - id: f005
    statement: "API-synthesis area requires nitrogen-blanketed atmosphere on all open vessels (oxygen <2%) during catalyst handling and reactor charging."
    confidence: 1.0
    factlet_type: hazard
    severity: high
    sources:
