    statement: "Line-1 reactor sequence is hard-coded R-1A → R-1B → R-1C, never parallel and never re-ordered. FDA-validated under our IND filing — changes require new validation work + filing amendment + 6-month review cycle."
    confidence: 1.0
    factlet_type: decision
    sources:
